# ===========================
# GOVI CONNECT - Application Configuration
# ===========================

spring.application.name=govi_connect
server.port=8080

# ===========================
# MySQL DataSource
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/govi_connect?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Colombo&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=root
spring.datasource.password=panke
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# HikariCP Connection Pool (Performance)
# ===========================
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=GoviConnectPool
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=true

# ===========================
# Database Initialization
# ===========================
spring.sql.init.mode=always
spring.sql.init.platform=mysql
spring.sql.init.continue-on-error=true


# ===========================
# Thymeleaf
# ===========================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ===========================
# Server Compression (gzip responses)
# ===========================
server.compression.enabled=false
server.compression.mime-types=text/html,text/css,application/javascript,application/json,text/xml
server.compression.min-response-size=1024

# ===========================
# File Upload (for blog images)
# ===========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-swallow-size=-1
app.upload.dir=uploads/blog-images

# ===========================
# Spring Mail (Gmail SMTP)
# Configure your Gmail + App Password below
# ===========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=pankajayunidu1234@gmail.com
spring.mail.password=wxax bcrs chxm pcvf
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===========================
# Cloudflare Turnstile
