advisory.how.step1.desc=ඔබේ ගොවිතැන් කලාපය තෝරන්න — වියළි කලාපය, අතරමැදි කලාපය හෝ තෙත් කලාපය. මෙය ඔබේ දේශගුණයට සහ වර්ෂාපතන රටාවන්ට ස්වභාවිකව ගැළපෙන භෝග මොනවාදැයි තීරණය කරයි.
