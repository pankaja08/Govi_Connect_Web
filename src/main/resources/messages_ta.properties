advisory.how.title=இது எப்படி இயங்குகிறது
advisory.how.subtitle=புத்திசாலித்தனமான விவசாய முடிவுகளுக்கு மூன்று எளிய படிகள்
advisory.how.step1.title=உங்கள் இருப்பிடத்தைத் தேர்வுசெய்க
advisory.how.step1.desc=உங்கள் விவசாய மண்டலத்தைத் தேர்ந்தெடுக்கவும் - உலர் மண்டலம், இடைநிலை மண்டலம் அல்லது ஈர மண்டலம். இது உங்கள் காலநிலை மற்றும் மழைப்பொழிவு முறைகளுக்கு இயற்கையாகவே பொருத்தமான பயிர்களைத் தீர்மானிக்கிறது.
advisory.how.step2.title=பருவம் மற்றும் மண் வகையைத் தேர்ந்தெடுக்கவும்
advisory.how.step2.desc=தற்போதைய பருவம் (மகா அல்லது யால) மற்றும் உங்கள் மண் வகையை எங்களிடம் கூறுங்கள். மண் வகை விருப்பத்திற்குரியது - உங்களுக்குத் தெரியாவிட்டால், அனைத்து பயிர்களையும் காண "ஏதேனும்" என்பதைத் தேர்ந்தெடுக்கவும்.
advisory.how.step3.title=விரிவான முடிவுகளைப் பெறுங்கள்
advisory.how.step3.desc="எனது பரிந்துரைகளைப் பெறுங்கள்" என்பதைக் கிளிக் செய்து, பொருத்தமான பயிர்களின் முழுப் பட்டியலையும் காணவும் - படங்கள், பராமரிப்பு வழிமுறைகள், உர வழிகாட்டுதல் மற்றும் நோய் எச்சரிக்கைகளுடன்.
advisory.how.tip.title=சிறப்பு ஆலோசனை
advisory.how.tip.desc=உங்கள் மண்டலம் மற்றும் பருவத்திற்கான அனைத்து பயிர்களையும் காண "ஏதேனும் மண் வகை" என்பதிலிருந்து தொடங்கவும், பின்னர் இலக்கு முடிவுகளுக்கு ஒரு குறிப்பிட்ட மண் வகையைப் பயன்படுத்தவும்.

