<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify OTP – GOVI CONNECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { 'gc-dark': '#166534', 'gc-green': '#22c55e', 'gc-gold': '#eab308' } } } }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link th:href="@{/css/main.css}" rel="stylesheet" />
    <style>
        #otp::placeholder {
            letter-spacing: normal;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>

<body class="font-inter min-h-screen flex items-center justify-center relative overflow-hidden"
    style="background: linear-gradient(135deg, #166534 0%, #22c55e 50%, #064e3b 100%);">
    
    <!-- Floating Leaves -->
    <div class="leaf-bg" aria-hidden="true">
        <span class="leaf leaf-1">🌿</span><span class="leaf leaf-2">🍃</span><span class="leaf leaf-3">🌱</span>
        <span class="leaf leaf-4">🍀</span><span class="leaf leaf-5">🌿</span><span class="leaf leaf-6">🍃</span>
    </div>

    <div class="relative z-10 w-full max-w-md px-6">
        <div class="bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <h1 class="text-white font-black text-3xl mb-2">Verify Code</h1>
                <p class="text-white text-sm">We've sent a 6-digit OTP to <span class="font-bold text-yellow-300" th:text="${email}"></span>.</p>
            </div>

            <!-- Messages -->
            <div th:if="${errorMessage}" class="bg-red-500/20 border border-red-400 text-red-200 rounded-xl px-4 py-3 text-sm mb-5" th:text="${errorMessage}"></div>

            <form th:action="@{/verify-otp}" method="post" class="space-y-5">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="email" th:value="${email}" />

                <div>
                    <label for="otp" class="block text-gc-dark text-sm font-black mb-1.5">6-Digit Code</label>
                    <input type="text" id="otp" name="otp" required maxlength="6" pattern="\d{6}" placeholder="Enter 6 digit OTP"
                        class="w-full bg-white/10 border border-white/20 text-white placeholder-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-gc-gold transition-all text-center tracking-[0.5em] font-bold text-xl" />
                </div>

                <button type="submit" class="w-full bg-gc-gold text-gc-dark font-black py-3.5 rounded-xl text-lg hover:bg-yellow-300 transition-all shadow-xl hover:-translate-y-0.5 mt-2">
                    Verify & Continue
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-white text-sm">
                    Didn't receive the code?
                    <a th:href="@{/forgot-password}" class="text-white font-black underline hover:text-gc-gold transition-colors">Resend (Start over)</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
