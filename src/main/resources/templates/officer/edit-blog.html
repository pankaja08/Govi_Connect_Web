<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Blog – GOVI CONNECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { 'gc-dark': '#166534', 'gc-green': '#22c55e', 'gc-gold': '#eab308', 'gc-tan': '#bbf7d0', 'gc-blue': '#3b82f6' } } } }</script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link th:href="@{/css/main.css}" rel="stylesheet" />
    <!-- Quill.js -->
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
</head>

<body class="font-inter bg-gray-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-gc-dark shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gc-gold rounded-full flex items-center justify-center"><span
                        class="font-black text-gc-dark text-sm">G</span></div>
                <span class="text-white font-black text-lg">GOVI<span class="text-gc-gold"> CONNECT</span></span>
                <span
                    class="ml-3 bg-gc-gold text-gc-dark text-xs font-black px-3 py-1 rounded-full uppercase">Expert</span>
            </div>
            <div class="flex items-center gap-4">
                <a th:href="@{/officer/dashboard}"
                    class="text-gray-300 hover:text-gc-gold text-sm font-medium transition-colors">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-6 py-10">

        <!-- Back Button -->
        <a th:href="@{/officer/dashboard}"
            class="inline-flex items-center gap-2 text-gray-500 hover:text-gc-dark font-medium text-sm mb-6 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
                </path>
            </svg>
            Back to Dashboard
        </a>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            <div class="bg-gc-dark px-8 py-5 flex items-center justify-between">
                <div>
                    <h2 class="text-white font-black text-2xl">✏️ Edit Blog Post</h2>
                    <p class="text-gray-300 text-sm mt-1">Update your existing blog post details</p>
                </div>
            </div>

            <div class="p-8">
                <!-- Use th:action with the blog's ID -->
                <form th:action="@{/officer/blog/{id}/edit(id=${blog.id})}" method="post" enctype="multipart/form-data"
                    id="editBlogForm">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <!-- Blog Heading -->
                    <div class="mb-6">
                        <label for="heading" class="block text-sm font-bold text-gray-700 mb-2">Blog Heading *</label>
                        <input type="text" id="heading" name="heading" required th:value="${blog.heading}"
                            placeholder="E.g. Effective Paddy Cultivation Techniques"
                            class="w-full border border-gray-300 rounded-xl px-5 py-3.5 text-gray-800 focus:outline-none focus:ring-2 focus:ring-gc-green focus:border-gc-green transition-all text-lg font-medium shadow-sm" />
                    </div>

                    <!-- Blog Tags Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <!-- Location Tag -->
                        <div>
                            <label for="locationTag" class="block text-sm font-bold text-gray-700 mb-2">Location</label>
                            <select id="locationTag" name="locationTag"
                                class="w-full border border-gray-300 rounded-xl px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-gc-green/50 focus:border-gc-green transition-all shadow-sm bg-white">
                                <option value="" th:selected="${blog.locationTag == null or blog.locationTag == ''}">All
                                    Island</option>
                                <option value="Western" th:selected="${blog.locationTag == 'Western'}">Western Province
                                </option>
                                <option value="Central" th:selected="${blog.locationTag == 'Central'}">Central Province
                                </option>
                                <option value="Southern" th:selected="${blog.locationTag == 'Southern'}">Southern
                                    Province</option>
                                <option value="Northern" th:selected="${blog.locationTag == 'Northern'}">Northern
                                    Province</option>
                                <option value="Eastern" th:selected="${blog.locationTag == 'Eastern'}">Eastern Province
                                </option>
                                <option value="North Western" th:selected="${blog.locationTag == 'North Western'}">North
                                    Western Province</option>
                                <option value="North Central" th:selected="${blog.locationTag == 'North Central'}">North
                                    Central Province</option>
                                <option value="Uva" th:selected="${blog.locationTag == 'Uva'}">Uva Province</option>
                                <option value="Sabaragamuwa" th:selected="${blog.locationTag == 'Sabaragamuwa'}">
                                    Sabaragamuwa Province</option>
                            </select>
                        </div>

                        <!-- Season Tag -->
                        <div>
                            <label for="seasonTag" class="block text-sm font-bold text-gray-700 mb-2">Season</label>
                            <select id="seasonTag" name="seasonTag"
                                class="w-full border border-gray-300 rounded-xl px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-gc-green/50 focus:border-gc-green transition-all shadow-sm bg-white">
                                <option value="" th:selected="${blog.seasonTag == null or blog.seasonTag == ''}">Any
                                    Season</option>
                                <option value="Yala" th:selected="${blog.seasonTag == 'Yala'}">Yala Season</option>
                                <option value="Maha" th:selected="${blog.seasonTag == 'Maha'}">Maha Season</option>
                            </select>
                        </div>

                        <!-- Crop Type Tag -->
                        <div>
                            <label for="cropTag" class="block text-sm font-bold text-gray-700 mb-2">Crop Type</label>
                            <select id="cropTag" name="cropTag"
                                class="w-full border border-gray-300 rounded-xl px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-gc-green/50 focus:border-gc-green transition-all shadow-sm bg-white">
                                <option value="" th:selected="${blog.cropTag == null or blog.cropTag == ''}">Any Crop
                                </option>
                                <option value="Paddy" th:selected="${blog.cropTag == 'Paddy'}">Paddy</option>
                                <option value="Vegetables" th:selected="${blog.cropTag == 'Vegetables'}">Vegetables
                                </option>
                                <option value="Fruits" th:selected="${blog.cropTag == 'Fruits'}">Fruits</option>
                                <option value="Grains" th:selected="${blog.cropTag == 'Grains'}">Grains (Corn, Millet,
                                    etc.)</option>
                                <option value="Export Crops" th:selected="${blog.cropTag == 'Export Crops'}">Export
                                    Crops (Tea, Rubber, Coconut)</option>
                                <option value="Spices" th:selected="${blog.cropTag == 'Spices'}">Spices</option>
                                <option value="Other" th:selected="${blog.cropTag == 'Other'}">Other</option>
                            </select>
                        </div>

                        <!-- Farming Method Tag -->
                        <div>
                            <label for="farmingMethodTag" class="block text-sm font-bold text-gray-700 mb-2">Farming
                                Method</label>
                            <select id="farmingMethodTag" name="farmingMethodTag"
                                class="w-full border border-gray-300 rounded-xl px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-gc-green/50 focus:border-gc-green transition-all shadow-sm bg-white">
                                <option value=""
                                    th:selected="${blog.farmingMethodTag == null or blog.farmingMethodTag == ''}">Any
                                    Method</option>
                                <option value="Traditional" th:selected="${blog.farmingMethodTag == 'Traditional'}">
                                    Traditional</option>
                                <option value="Organic" th:selected="${blog.farmingMethodTag == 'Organic'}">Organic
                                </option>
                                <option value="Greenhouse" th:selected="${blog.farmingMethodTag == 'Greenhouse'}">
                                    Greenhouse (Poly-tunnel)</option>
                                <option value="Hydroponics" th:selected="${blog.farmingMethodTag == 'Hydroponics'}">
                                    Hydroponics / Aquaponics</option>
                                <option value="Smart Farming" th:selected="${blog.farmingMethodTag == 'Smart Farming'}">
                                    Smart Farming (IoT)</option>
                                <option value="Mixed Farming" th:selected="${blog.farmingMethodTag == 'Mixed Farming'}">
                                    Mixed Farming</option>
                                <option value="Other" th:selected="${blog.farmingMethodTag == 'Other'}">Other</option>
                            </select>
                        </div>
                    </div>

                    <!-- Blog Image -->
                    <div class="mb-6">
                        <label for="image" class="block text-sm font-bold text-gray-700 mb-2">Cover Image</label>
                        <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:border-gc-green hover:bg-green-50/50 transition-all cursor-pointer relative group"
                            id="drop-zone">
                            <input type="file" id="image" name="image" accept="image/*"
                                class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                                onchange="previewImage(this)" />
                            <div class="flex flex-col items-center justify-center">
                                <div id="upload-placeholder" th:class="${blog.imageUrl != null ? 'hidden' : 'block'}">
                                    <div class="text-5xl mb-3 group-hover:scale-110 transition-transform">📸</div>
                                    <p class="text-gray-700 text-base font-semibold">Click or drag image to update cover
                                    </p>
                                    <p class="text-gray-500 text-sm mt-1">PNG, JPG, WEBP up to 10MB</p>
                                </div>
                                <img id="image-preview" th:src="${blog.imageUrl != null ? blog.imageUrl : ''}"
                                    th:class="${blog.imageUrl != null ? 'block max-h-64 mx-auto rounded-xl object-cover shadow-md' : 'hidden max-h-64 mx-auto rounded-xl object-cover shadow-md'}"
                                    alt="Preview" />
                            </div>
                        </div>
                    </div>

                    <!-- Quill.js Rich Text Editor -->
                    <div class="mb-8">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Blog Content *</label>
                        <!-- We use a hidden input to store the raw HTML content from the DB to populate Quill -->
                        <div id="hidden-content" class="hidden" th:utext="${blog.textContent}"></div>
                        <div id="quill-editor"
                            class="rounded-xl overflow-hidden border border-gray-300 shadow-sm bg-white"
                            style="min-height: 400px; font-size: 16px;"></div>
                        <input type="hidden" name="textContent" id="textContent" />
                    </div>

                    <div class="flex items-center gap-4">
                        <!-- Submit Button -->
                        <button type="submit" id="updateBtn" onclick="submitBlog(event)"
                            class="flex-1 bg-gc-dark hover:bg-gc-green text-white font-black py-4 rounded-xl text-lg transition-all shadow-lg hover:shadow-xl hover:-translate-y-0.5 flex justify-center items-center gap-2">
                            <span>💾</span> Update Blog Post
                        </button>
                        <!-- Cancel Button -->
                        <a th:href="@{/officer/dashboard}"
                            class="px-8 py-4 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition-colors">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Quill.js CDN -->
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <script>
        // Initialize Quill editor
        const quill = new Quill('#quill-editor', {
            theme: 'snow',
            placeholder: 'Write your blog content here...',
            modules: {
                toolbar: [
                    [{ header: [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ color: [] }, { background: [] }],
                    [{ list: 'ordered' }, { list: 'bullet' }],
                    [{ indent: '-1' }, { indent: '+1' }],
                    ['blockquote', 'code-block'],
                    ['link', 'image'],
                    ['clean']
                ]
            }
        });

        // Load existing content into Quill
        const existingContent = document.getElementById('hidden-content').innerHTML;
        quill.root.innerHTML = existingContent;

        function submitBlog(e) {
            e.preventDefault();
            const content = quill.root.innerHTML;
            if (quill.getText().trim().length === 0) {
                alert('Please write some blog content before updating.');
                return;
            }

            // Optional Image Dimension Validation
            const fileInput = document.getElementById('image');
            if (fileInput.files && fileInput.files[0]) {
                const img = new Image();
                img.onload = function () {
                    if (this.width < 400 || this.height < 300) {
                        alert(`Image resolution is too low (${this.width}x${this.height}). Recommended minimum is 400x300 pixels for better display quality.`);
                        // We decide to just warn them but let them upload anyway, or we could return here to block it.
                        // Let's block it for strict validation:
                        // return; 
                    }
                    finalizeSubmit(content);
                };
                img.onerror = function () {
                    alert('Invalid image file.');
                };
                img.src = URL.createObjectURL(fileInput.files[0]);
            } else {
                finalizeSubmit(content);
            }
        }

        function finalizeSubmit(content) {
            document.getElementById('textContent').value = content;
            document.getElementById('editBlogForm').submit();
        }

        // Real-time error clearing
        document.querySelectorAll('input, select, textarea').forEach(input => {
            input.addEventListener('input', () => {
                input.classList.remove('border-red-500', 'ring-red-500');
                const errorEl = document.getElementById(input.id + 'Error');
                if (errorEl) {
                    errorEl.classList.add('hidden');
                    errorEl.textContent = '';
                }
            });
        });

        if (quill) {
            quill.on('text-change', () => {
                const editorContainer = document.querySelector('.ql-container');
                if (editorContainer) editorContainer.classList.remove('border-red-500');
            });
        }
    </script>
</body>

</html>
