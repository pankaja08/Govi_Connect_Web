<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Access Denied – GOVI CONNECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { 'gc-dark': '#166534', 'gc-green': '#22c55e', 'gc-gold': '#eab308', 'gc-tan': '#bbf7d0', 'gc-blue': '#3b82f6' } } } }</script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
</head>

<body class="font-inter min-h-screen flex items-center justify-center text-center"
    style="background:linear-gradient(135deg,#166534,#064e3b)">
    <div class="text-white px-6">
        <div class="text-8xl mb-6">🚫</div>
        <h1 class="text-5xl font-black mb-3">403 – Access Denied</h1>
        <p class="text-gray-300 text-lg mb-8">You don't have permission to view this page.</p>
        <a th:href="@{/}"
            class="bg-gc-gold text-gc-dark font-black px-8 py-3 rounded-full text-lg hover:bg-yellow-300 transition-all shadow-xl">
            ← Back to Home
        </a>
    </div>
</body>

</html>
